<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order History | Piyush Da Dhaba 📦</title>
    <link rel="stylesheet" href="css/shared.css">
    <style>
        .orders-grid{display:flex;flex-direction:column;gap:18px;animation:fadeInUp .6s ease-out .2s both;}
        .order-card{background:var(--card-bg);border-radius:18px;border:1px solid var(--card-border);box-shadow:0 6px 25px rgba(58,31,20,.08);padding:22px;display:flex;align-items:center;gap:20px;transition:transform .3s ease,box-shadow .3s ease;}
        .order-card:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(58,31,20,.14);}
        .order-id{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--brown);min-width:170px;}
        .order-id small{display:block;font-family:'Poppins',sans-serif;font-size:.78rem;font-weight:400;color:var(--brown4);margin-top:2px;}
        .order-items-list{flex:1;display:flex;flex-wrap:wrap;gap:6px;}
        .order-items-list span{padding:4px 12px;background:rgba(245,199,120,.1);border-radius:15px;font-size:.78rem;color:var(--brown2);border:1px solid rgba(212,167,106,.18);}
        .order-total{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;color:var(--brown3);min-width:80px;text-align:right;}
        .order-actions a{white-space:nowrap;}
        @media(max-width:700px){
            .order-card{flex-wrap:wrap;gap:12px;}
            .order-id{min-width:auto;width:100%;}
            .order-total{text-align:left;width:100%;}
        }
    </style>
</head>
<body>
<div class="container">
    <header><div class="navcontainer"><nav><ul id="navlist">
        <li><a href="index.html" id="logo">🍽️ Piyush Da Dhaba</a></li>
        <li><div id="navlinks">
            <a href="index.html">Home</a>
            <a href="orders.html">Orders</a>
            <a href="cart.html" class="cart-link">🛒<span class="cart-badge" id="cart-badge">0</span></a>
        </div></li>
    </ul></nav></div></header>

    <main class="page-main">
        <h1 class="page-title">📦 Order History</h1>
        <div id="orders-content"></div>
    </main>

    <footer><div class="footerbox">
        <p>🍽️ Copyright &copy; 2024–2026 Piyush Da Dhaba Pvt Ltd. All Rights Reserved. 🍽️</p>
        <p class="footer-tagline">Made with ❤️ and lots of Ghee by Piyush</p>
    </div></footer>
</div>
<script src="js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const orders = getOrders();
    const el = document.getElementById('orders-content');
    if (orders.length === 0) {
        el.innerHTML = '<div class="empty-state"><span class="empty-icon">📦</span><h3>No orders yet</h3><p>Place your first order and it will appear here!</p><a href="index.html#menu" class="btn-gold">🍽️ Browse Menu</a></div>';
        return;
    }
    let html = '<div class="orders-grid">';
    orders.forEach(order => {
        const itemTags = order.items.map(i => `<span>${i.name} ×${i.quantity}</span>`).join('');
        html += `<div class="order-card">
            <div class="order-id">${order.orderId}<small>${formatDate(order.date)}</small></div>
            <div class="order-items-list">${itemTags}</div>
            <div class="order-total">${formatCurrency(order.total)}</div>
            <div class="order-actions"><a href="receipt.html?id=${order.orderId}" class="btn-gold" style="padding:8px 18px;font-size:.85rem;">🧾 Receipt</a></div>
        </div>`;
    });
    html += '</div>';
    el.innerHTML = html;
});
</script>
</body>
</html>
