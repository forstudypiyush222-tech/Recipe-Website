<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt | Piyush Da Dhaba 🧾</title>
    <link rel="stylesheet" href="../css/shared.css">
    <style>
        .receipt{max-width:600px;margin:0 auto;animation:fadeInUp .6s ease-out .2s both;}
        .receipt-card{background:var(--card-bg);border-radius:20px;border:1px solid var(--card-border);box-shadow:0 8px 40px rgba(58,31,20,.12);overflow:hidden;}
        .receipt-header{background:linear-gradient(135deg,#3d1f14,#5a2d1a);padding:30px;text-align:center;}
        .receipt-header h2{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.8rem;}
        .receipt-header p{color:#e8d5c0;font-size:.9rem;margin-top:4px;}
        .receipt-body{padding:30px;}
        .receipt-meta{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:20px;padding-bottom:15px;border-bottom:2px dashed var(--gold2);}
        .receipt-meta div{font-size:.85rem;color:var(--brown2);}
        .receipt-meta strong{color:var(--brown);display:block;font-size:.95rem;}
        .receipt-items{margin-bottom:20px;}
        .receipt-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(212,167,106,.15);}
        .receipt-item:last-child{border-bottom:none;}
        .receipt-item img{width:50px;height:50px;border-radius:10px;object-fit:cover;}
        .receipt-item-info{flex:1;}
        .receipt-item-info h4{font-size:.92rem;color:var(--brown);}
        .receipt-item-info span{font-size:.78rem;color:var(--brown4);}
        .receipt-item-price{font-weight:700;color:var(--brown3);white-space:nowrap;}
        .receipt-totals{background:rgba(245,199,120,.06);border-radius:12px;padding:15px;margin-bottom:20px;}
        .receipt-totals .row{display:flex;justify-content:space-between;padding:4px 0;font-size:.9rem;color:var(--brown2);}
        .receipt-totals .row.total{font-weight:800;font-size:1.1rem;color:var(--brown);border-top:2px solid var(--gold2);padding-top:10px;margin-top:6px;}
        .receipt-totals .row.total span:last-child{font-family:'Playfair Display',serif;font-size:1.3rem;}
        .receipt-payment{background:rgba(46,125,50,.06);border-radius:12px;padding:15px;margin-bottom:20px;border-left:3px solid var(--green);}
        .receipt-payment .row{display:flex;justify-content:space-between;padding:3px 0;font-size:.88rem;color:var(--brown2);}
        .receipt-payment .row strong{color:var(--brown);}
        .receipt-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:20px;}
        .receipt-actions a,.receipt-actions button{flex:1;min-width:150px;text-align:center;}
        .receipt-stamp{text-align:center;margin:15px 0;font-size:1.3rem;color:var(--green);font-weight:700;font-family:'Playfair Display',serif;letter-spacing:2px;}
        @media print{.navcontainer,.footerbox,.receipt-actions{display:none!important;}.receipt-card{box-shadow:none;border:1px solid #ddd;}}
        @media(max-width:500px){.receipt-meta{flex-direction:column;}.receipt-actions{flex-direction:column;}.receipt-actions a,.receipt-actions button{min-width:auto;}}
    </style>
</head>
<body>
<div class="container">
    <header><div class="navcontainer"><nav><ul id="navlist">
        <li><a href="index.html" id="logo">🍽️ Piyush Da Dhaba</a></li>
        <li><div id="navlinks">
            <a href="index.html">Home</a>
            <a href="orders.html">Orders</a>
            <a href="cart.html" class="cart-link">🛒<span class="cart-badge" id="cart-badge">0</span></a>
        </div></li>
    </ul></nav></div></header>

    <main class="page-main">
        <h1 class="page-title">🧾 Order Receipt</h1>
        <div class="receipt" id="receipt-content"></div>
    </main>

    <footer><div class="footerbox">
        <p>🍽️ Copyright &copy; 2024–2026 Piyush Da Dhaba Pvt Ltd. All Rights Reserved. 🍽️</p>
        <p class="footer-tagline">Made with ❤️ and lots of Ghee by Piyush</p>
    </div></footer>
</div>
<script src="../js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const orderId = params.get('id');
    const el = document.getElementById('receipt-content');
    if (!orderId) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">🧾</span><h3>No receipt found</h3><p>Order ID is missing.</p><a href="orders.html" class="btn-gold">📦 View Orders</a></div>'; return; }
    const order = getOrderById(orderId);
    if (!order) { el.innerHTML = '<div class="empty-state"><span class="empty-icon">🧾</span><h3>Order not found</h3><p>No order with ID ' + orderId + '</p><a href="orders.html" class="btn-gold">📦 View Orders</a></div>'; return; }

    const subtotal = order.items.reduce((s,i)=>s+i.price*i.quantity,0);
    const gst = Math.round(subtotal * 0.05);
    let itemsHTML = '';
    order.items.forEach(item => {
        itemsHTML += `<div class="receipt-item">
            <img src="${item.image || IMAGES[item.name] || ''}" alt="${item.name}">
            <div class="receipt-item-info"><h4>${item.name}</h4><span>× ${item.quantity} @ ${formatCurrency(item.price)}</span></div>
            <div class="receipt-item-price">${formatCurrency(item.price * item.quantity)}</div>
        </div>`;
    });

    el.innerHTML = `<div class="receipt-card">
        <div class="receipt-header"><h2>🍽️ Piyush Da Dhaba</h2><p>Official Receipt</p></div>
        <div class="receipt-body">
            <div class="receipt-meta">
                <div>Order ID<strong>${order.orderId}</strong></div>
                <div>Date<strong>${formatDate(order.date)}</strong></div>
                ${order.customer && order.customer.name ? `<div>Customer<strong>${order.customer.name}</strong></div>` : ''}
            </div>
            <div class="receipt-items">${itemsHTML}</div>
            <div class="receipt-totals">
                <div class="row"><span>Subtotal</span><span>${formatCurrency(subtotal)}</span></div>
                <div class="row"><span>GST (5%)</span><span>${formatCurrency(gst)}</span></div>
                <div class="row"><span>Delivery</span><span style="color:var(--green);font-weight:600">FREE</span></div>
                <div class="row total"><span>Total</span><span>${formatCurrency(order.total)}</span></div>
            </div>
            <div class="receipt-payment">
                <div class="row"><span>Payment Method</span><strong>UPI</strong></div>
                <div class="row"><span>UPI ID</span><strong>${order.upiId || UPI_ID}</strong></div>
                <div class="row"><span>Status</span><strong style="color:var(--green)">✅ Paid</strong></div>
            </div>
            <div class="receipt-stamp">✅ PAID</div>
            <div class="receipt-actions">
                <button class="btn-gold" onclick="window.print()">🖨️ Download / Print</button>
                <a href="orders.html" class="btn-secondary">📦 Order History</a>
                <a href="index.html" class="btn-secondary">🏠 Back to Home</a>
            </div>
        </div>
    </div>`;
});
</script>
</body>
</html>
